services:
  web-vault-sync:
    image: web-vault-sync:local
    build:
      context: ../../..
      dockerfile: clients/headless/Dockerfile
    user: node
    restart: unless-stopped
    init: true
    stop_grace_period: 45s
    command: ["watch"]
    environment:
      WEB_VAULT_SYNC_CONFIG_DIR: /config
      WEB_VAULT_SYNC_TOKEN_FILE: /run/secrets/sync_token
    volumes:
      - web-vault-sync-config:/config
      - /srv/notes:/vault
    secrets:
      - sync_token
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1700
    security_opt:
      - no-new-privileges:true
    cap_drop: ["ALL"]

volumes:
  web-vault-sync-config:

secrets:
  sync_token:
    file: ./sync-token
