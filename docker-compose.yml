services:
  webobsidian:
    build: .
    image: webobsidian:latest
    container_name: webobsidian
    restart: unless-stopped
    ports:
      # ${HTTP_PORT:-8787} on the host → 8787 in the container.
      # Set HTTP_BIND=127.0.0.1 in .env to expose only to localhost (reverse proxy).
      - "${HTTP_BIND:-0.0.0.0}:${HTTP_PORT:-8787}:8787"
    environment:
      # Set an initial password (otherwise set it on first-run in the UI)
      WEBOBSIDIAN_PASSWORD: ${WEBOBSIDIAN_PASSWORD:-}
      # File-watch mode: auto (native + polling fallback) | polling. See .env.example.
      WEBOBSIDIAN_WATCH: ${WEBOBSIDIAN_WATCH:-auto}
      VAULT_PATH: /vaults/default
      DATA_DIR: /data
      # All canonical vault roots live below /vaults; /vault remains a same-source legacy alias.
      ALLOWED_ROOTS: /vaults,/vault
      NODE_ENV: production
    volumes:
      # Common parent for every canonical vault root.
      - ${VAULTS_HOST_PATH:-./sample-vaults}:/vaults
      # Default vault source is mounted canonically below /vaults and at /vault only as a legacy rollback alias.
      # The child bind intentionally overrides /vaults/default from the parent mount.
      - ${VAULT_HOST_PATH:-./sample-vault}:/vaults/default
      - ${VAULT_HOST_PATH:-./sample-vault}:/vault
      # Persisted settings.json + per-vault sync/search/share/workspace state.
      # Set DATA_HOST_PATH to an absolute host directory for backup-visible bind storage.
      - ${DATA_HOST_PATH:-webobsidian-data}:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Allow time for the initial vault index on first boot (large vaults).
      start_period: 90s

volumes:
  webobsidian-data:
