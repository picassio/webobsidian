name: Stable release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck && npm test && npm run lint:sync-api && npm audit --audit-level=low && npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:browser
      - name: Verify tag equals all publishable package versions
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          test "$(node -p "require('./package.json').version")" = "$VERSION"
          test "$(node -p "require('./packages/sync-core/package.json').version")" = "$VERSION"
          test "$(node -p "require('./clients/headless/package.json').version")" = "$VERSION"
      - name: Assemble npm and server artifacts
        run: |
          mkdir -p release
          npm pack --workspace @webobsidian/sync-core --pack-destination release
          npm pack --workspace web-vault-sync --pack-destination release
          tar -czf "release/webobsidian-server-${GITHUB_REF_NAME}.tar.gz" \
            package.json package-lock.json README.md LICENSE SECURITY.md \
            server/package.json server/dist server/public \
            packages/sync-core/package.json packages/sync-core/dist
          npm sbom --sbom-format=cyclonedx > "release/webobsidian-${GITHUB_REF_NAME}.cdx.json"
          (cd release && sha256sum * > SHA256SUMS)
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: release/*
      - name: Publish npm packages
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --workspace @webobsidian/sync-core --access public --provenance
          npm publish --workspace web-vault-sync --access public --provenance
      - name: Create immutable GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release/* --verify-tag --generate-notes --title "WebObsidian $GITHUB_REF_NAME"

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: server-meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/webobsidian
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}
          provenance: mode=max
          sbom: true
      - uses: docker/metadata-action@v5
        id: headless-meta
        with:
          images: ghcr.io/${{ github.repository_owner }}/web-vault-sync
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: clients/headless/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.headless-meta.outputs.tags }}
          labels: ${{ steps.headless-meta.outputs.labels }}
          provenance: mode=max
          sbom: true
