name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**/*.png'
      - 'docs/**/*.jpg'
      - 'docs/**/*.jpeg'
      - 'docs/**/*.webp'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**/*.png'
      - 'docs/**/*.jpg'
      - 'docs/**/*.jpeg'
      - 'docs/**/*.webp'

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Typecheck
        run: npm run typecheck

      - name: Unit, fault, scale, and recovery tests
        run: npm test

      - name: Validate Sync OpenAPI and Markdown links
        run: npm run lint:sync-api && npm run lint:docs

      - name: Dependency audit
        run: npm audit --audit-level=low

      - name: Build
        run: npm run build

      - name: Install Chromium for browser-pair E2E
        run: npx playwright install --with-deps chromium

      - name: Two-browser Central Sync E2E
        run: npm run test:e2e:browser

      - name: Two-headless-client Central Sync E2E
        run: npm run test:e2e:headless

      - name: Multi-vault isolation, auth, and restart E2E
        run: npm run test:e2e:multi-vault

      - name: Verify headless systemd units
        run: systemd-analyze verify clients/headless/packaging/systemd/web-vault-sync.service clients/headless/packaging/systemd/web-vault-sync@.service

  docker:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify Compose healthcheck and multi-vault mount
        run: |
          test "$(docker compose config --format json | jq -r '.services.webobsidian.healthcheck.test[-1]')" = \
            "http://127.0.0.1:8787/healthz"
          docker compose config --format json | jq -e '.services.webobsidian.volumes[] | select(.target == "/vaults")' >/dev/null

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build server for amd64 and arm64 with attestations
        run: docker buildx build --platform linux/amd64,linux/arm64 --sbom=true --provenance=mode=max --output type=oci,dest=/tmp/webobsidian.oci .

      - name: Build headless client for amd64 and arm64 with attestations
        run: docker buildx build --platform linux/amd64,linux/arm64 --sbom=true --provenance=mode=max -f clients/headless/Dockerfile --output type=oci,dest=/tmp/web-vault-sync.oci .

      - name: Smoke-test non-root headless image
        run: |
          docker build -f clients/headless/Dockerfile -t web-vault-sync:ci .
          test "$(docker image inspect web-vault-sync:ci --format '{{.Config.User}}')" = "node"
          docker run --rm web-vault-sync:ci help
          docker run --rm -v headless-ci-config:/config -v headless-ci-vault:/vault web-vault-sync:ci \
            init --server http://127.0.0.1:3000 --vault /vault --mode pull-only --json
